name: Build geoip files
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - ".gitignore"
      - "LICENSE*"
      - "*.md"

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      TAG_NAME: latest
      RELEASE_NAME: latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout runetfreedom/geoip
        uses: actions/checkout@v6
        with:
          repository: runetfreedom/geoip
          path: geoip

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./geoip/go.mod

      - name: Build geoip files
        run: |
          go build -C geoip ./
          ./geoip/geoip convert -c ./config.json

      - name: Prepare sing-box release assets
        run: |
          mkdir -p ./release
          jq -r '.input[] | select(.args.name != null) | .args.name' ./config.json | sort -u | while read -r name; do
            cp "./output/srs/${name}.srs" "./release/${name}.srs"
          done

      - name: Upload files to GitHub release
        uses: svenstaro/upload-release-action@v2
        with:
          overwrite: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file_glob: true
          file: ./release/*
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
